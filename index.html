<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b141a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            background-color: #0b141a;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .chat-header {
            background-color: #202c33;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #2a3942;
        }

        .chat-header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-info h2 {
            color: #e9edef;
            font-size: 16px;
            font-weight: 500;
        }

        .chat-header-info span {
            color: #8696a0;
            font-size: 13px;
        }

        .chat-messages {
            background-color: #0b141a;
            padding: 20px;
            min-height: 500px;
            max-height: 70vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            opacity: 0;
            transform: translateY(20px);
            animation: messageIn 0.4s ease forwards;
        }

        @keyframes messageIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .message-content {
            max-width: 75%;
        }

        .message-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #25d366;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .message.received .message-bubble {
            background-color: #202c33;
            color: #e9edef;
            border-top-left-radius: 0;
        }

        .message.received .message-bubble::before {
            content: '';
            position: absolute;
            top: 0;
            left: -8px;
            border-width: 0 8px 8px 0;
            border-style: solid;
            border-color: transparent #202c33 transparent transparent;
        }

        .message.sent {
            flex-direction: row-reverse;
        }

        .message.sent .message-content {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .message.sent .message-name {
            color: #53bdeb;
        }

        .message.sent .message-bubble {
            background-color: #005c4b;
            color: #e9edef;
            border-top-right-radius: 0;
        }

        .message.sent .message-bubble::before {
            content: '';
            position: absolute;
            top: 0;
            right: -8px;
            left: auto;
            border-width: 0 0 8px 8px;
            border-style: solid;
            border-color: transparent transparent transparent #005c4b;
        }

        .message.no-name .message-name {
            display: none;
        }

        .response-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px 20px;
            background-color: #202c33;
            border-top: 1px solid #2a3942;
        }

        .response-options.hidden {
            display: none;
        }

        .response-btn {
            padding: 12px 20px;
            background-color: #00a884;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .response-btn:hover {
            background-color: #25d366;
            transform: scale(1.02);
        }

        .response-btn:active {
            transform: scale(0.98);
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
        }

        .typing-indicator.hidden {
            display: none;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            background-color: #202c33;
            border-radius: 8px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background-color: #8696a0;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #0b141a;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #374045;
            border-radius: 3px;
        }

        @media (max-width: 520px) {
            body {
                padding: 0;
            }

            .chat-container {
                border-radius: 0;
                max-width: 100%;
                height: 100vh;
            }

            .chat-messages {
                max-height: calc(100vh - 160px);
                min-height: calc(100vh - 160px);
            }
        }
    </style>
</head>
<body>

                <h2>Havenna</h2>

            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="typing-indicator hidden" id="typingIndicator">
                <img src="" alt="" class="message-avatar">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>

        <div class="response-options hidden" id="responseOptions">
            <button class="response-btn" onclick="selectResponse('Sim')">Sim</button>
            <button class="response-btn" onclick="selectResponse('Óbvio')">Óbvio</button>
            <button class="response-btn" onclick="selectResponse('Claro')">Claro</button>
        </div>
    </div>

                    hideTypingIndicator();
                    const message = createReceivedMessage(step.image, step.name, step.text);
                    addMessage(message);
                    currentStep++;
                    setTimeout(processNextStep, DELAY_BETWEEN_MESSAGES);
                }, TYPING_DURATION);
                
            } else if (step.type === 'user-choice') {
                conversationPaused = true;
                showResponseOptions();
            }
        }

        // Iniciar conversa
        setTimeout(processNextStep, 1000);
    </script>
</body>
</html>
